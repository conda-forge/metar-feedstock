{% set version = "2.0.0" %}

package:
  name: metar
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/python_metar/python_metar-{{ version }}.tar.gz
  sha256: 2d8d7777684a8e986060ec1bc5d682fe8b5e0806bc6cf36bed031d4df48713d5

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - metar

about:
  home: http://github.com/python-metar/python-metar
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: |
    python-metar is a python package that parses coded METAR weather reports.
  description: |
    python-metar is a python package that parses coded METAR weather reports.
  doc_url: https://github.com/python-metar/python-metar
  dev_url: https://github.com/python-metar/python-metar

extra:
  recipe-maintainers:
    - phobson
    - akrherz
